name: 순위 수집 & 배포

on:
  schedule:
    # 매일 KST 11:00 (= UTC 02:00)
    # 예스24 베스트셀러는 "최근 7일 판매량" 기준으로 하루 1회 집계되는데,
    # 갱신 시각을 공개하지 않는다. 관측상 오전 9시 이전에는 이미 전일까지 반영돼 있었다.
    # 09시에 긁으면 갱신 경계에 걸려 하루 지난 순위를 기록할 위험이 있어 11시로 미뤘다.
    # (순위는 하루 1회만 바뀌므로 늦게 긁어도 정보 손실이 없다)
    - cron: "0 2 * * *"
  workflow_dispatch: # 수동 실행 버튼
  push:
    branches: [main]
    # 대시보드나 수집기를 고치면 곧바로 재배포한다.
    # (이게 없으면 index.html을 커밋해도 Pages가 옛 버전을 계속 서빙한다)
    # data/ 는 제외 — 수집 결과 커밋이 워크플로를 다시 부르지 않도록.
    # ※ GITHUB_TOKEN 으로 한 push 는 원래 워크플로를 재트리거하지 않지만, 이중으로 막아둔다.
    paths-ignore:
      - "data/**"
      - "README.md"

permissions:
  contents: write
  pages: write
  id-token: write

# 두 실행이 겹치면 data/history.json 을 동시에 커밋하려다 push가 거부된다.
# 워크플로 전체를 한 번에 하나만 돌도록 직렬화한다 (취소하지 않고 큐에 세운다).
concurrency:
  group: collect-and-deploy
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: 의존성 설치
        run: |
          npm install playwright@1.49.1
          npx playwright install --with-deps chromium

      - name: 순위 수집
        run: node scripts/collect.mjs

      - name: 변경사항 커밋
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/history.json

          if git diff --staged --quiet; then
            echo "변경 없음"
            exit 0
          fi

          git commit -m "순위 수집: $(TZ=Asia/Seoul date '+%Y-%m-%d')"

          # 다른 커밋이 그 사이에 들어오면 push가 거부된다(! [rejected] ... fetch first).
          # rebase 후 재시도한다. 3번까지.
          for i in 1 2 3; do
            if git push; then
              echo "push 성공 (시도 $i)"
              exit 0
            fi
            echo "push 거부됨 — rebase 후 재시도 ($i/3)"
            git pull --rebase --autostash origin main || exit 1
            sleep 3
          done

          echo "3회 시도 후에도 push 실패"
          exit 1

      - name: Pages 아티팩트 업로드
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

  deploy:
    needs: collect
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
