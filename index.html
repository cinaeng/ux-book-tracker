<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>UX의 언어들 — 서점 순위 트래커</title>
<meta name="description" content="도서 「UX의 언어들」의 예스24·교보문고 베스트셀러 순위 트래커">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='14' font-size='14'>📚</text></svg>">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.5.0/dist/chart.umd.js"></script>
<style>
  :root { color-scheme: light; }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: #f6f6f4; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Pretendard",
                 "Noto Sans KR", "Malgun Gothic", "맑은 고딕", sans-serif;
    color: #1a1a1a;
  }
  #root { max-width: 960px; margin: 0 auto; padding: 36px 28px 56px; }
  @media (max-width: 560px) { #root { padding: 22px 16px 40px; } }

  .loading { padding: 60px 0; text-align: center; color: #999; font-size: 14px; }

  .hdr { border-bottom: 2px solid #111; padding-bottom: 15px; margin-bottom: 20px; }
  .hdr-row { display: flex; justify-content: space-between; align-items: flex-start; gap: 16px; flex-wrap: wrap; }
  .hdr h1 { margin: 0 0 5px; font-size: 22px; font-weight: 700; letter-spacing: -0.4px; }
  .hdr .sub { font-size: 13px; color: #666; margin: 0; }
  .hdr .meta { font-size: 12px; color: #999; margin-top: 9px; }
  .refresh {
    flex: 0 0 auto; text-decoration: none; white-space: nowrap;
    padding: 8px 15px; font-size: 12.5px; font-weight: 600;
    color: #fff; background: #111; border-radius: 999px;
    transition: background .12s, transform .12s;
  }
  .refresh:hover { background: #333; transform: translateY(-1px); }

  .tabs { display: flex; gap: 4px; border-bottom: 1px solid #e0e0e0; margin-bottom: 20px; }
  .tabs button {
    appearance: none; border: none; background: none; cursor: pointer; font-family: inherit;
    padding: 10px 18px; font-size: 14px; font-weight: 600; color: #999;
    border-bottom: 2px solid transparent; margin-bottom: -1px; transition: color .12s;
  }
  .tabs button:hover { color: #555; }
  .tabs button.on { color: #111; border-bottom-color: #111; }

  .subtabs { display: flex; gap: 6px; margin-bottom: 20px; }
  .subtabs button {
    appearance: none; cursor: pointer; font-family: inherit;
    padding: 6px 14px; font-size: 12px; font-weight: 600;
    border: 1px solid #e0e0e0; background: #fff; color: #777; border-radius: 999px;
    transition: all .12s;
  }
  .subtabs button:hover { border-color: #bbb; color: #444; }
  .subtabs button.on { background: #111; border-color: #111; color: #fff; }

  .pane { display: none; }
  .pane.on { display: block; }

  .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(178px, 1fr)); gap: 12px; margin-bottom: 26px; }
  .card {
    border: 1px solid #e4e4e2; border-radius: 12px; padding: 14px 16px; background: #fff;
    position: relative; display: block; color: inherit; text-decoration: none;
    transition: border-color .12s, box-shadow .12s, transform .12s;
  }
  a.card { cursor: pointer; }
  a.card:hover { border-color: #999; box-shadow: 0 4px 14px rgba(0,0,0,.08); transform: translateY(-1px); }
  a.card::after {
    content: "↗"; position: absolute; top: 12px; right: 13px;
    font-size: 11px; color: #ccc; transition: color .12s;
  }
  a.card:hover::after { color: #1a5fb4; }
  .card.hero { background: #f1f6fd; border-color: #bcd5f0; }
  a.card.hero:hover { border-color: #5b9bd8; }
  .card .lbl { font-size: 11.5px; font-weight: 600; color: #555; margin-bottom: 9px; display: flex; align-items: center; gap: 6px; }
  .dot { width: 7px; height: 7px; border-radius: 50%; flex: 0 0 auto; }
  .card .val { font-size: 29px; font-weight: 700; letter-spacing: -1px; line-height: 1.1; }
  .card .val small { font-size: 13px; font-weight: 600; color: #555; }
  .card .val.out { font-size: 15px; color: #aaa; font-weight: 600; letter-spacing: 0; }
  .card .sub2 { font-size: 10.5px; color: #999; margin-top: 4px; line-height: 1.45; }
  .delta { font-size: 12px; font-weight: 700; margin-left: 6px; }
  .up { color: #0a7f3f; } .down { color: #c92a2a; }

  h2 { font-size: 13.5px; font-weight: 700; margin: 26px 0 12px; padding-bottom: 7px; border-bottom: 1px solid #e6e6e4; }
  h2 span { font-weight: 400; color: #999; font-size: 12px; }
  .panel { background: #fff; border: 1px solid #e4e4e2; border-radius: 12px; padding: 16px; }
  .chartbox { height: 225px; position: relative; }

  table { width: 100%; border-collapse: collapse; font-size: 12px; background: #fff; }
  th, td { padding: 8px 10px; text-align: right; border-bottom: 1px solid #f0f0ee; white-space: nowrap; }
  th { background: #f7f7f5; font-weight: 600; color: #555; font-size: 11px; }
  th:first-child, td:first-child { text-align: left; }
  tbody tr:last-child td { border-bottom: none; }
  .tablewrap { border: 1px solid #e4e4e2; border-radius: 12px; overflow: hidden; }
  .na { color: #ccc; }

  .note { margin-top: 20px; padding: 13px 15px; background: #fff; border-left: 3px solid #d4d4d2; border-radius: 0 8px 8px 0; font-size: 11.5px; color: #666; line-height: 1.7; border-top: 1px solid #eee; border-right: 1px solid #eee; border-bottom: 1px solid #eee; }
  .note.warn { background: #fdfaf5; border-left-color: #e0a96d; }
  .note b { color: #333; }
  .links { margin-top: 14px; font-size: 12px; display: flex; gap: 16px; flex-wrap: wrap; }
  .links a { color: #1a5fb4; text-decoration: none; }
  .links a:hover { text-decoration: underline; }
  .foot { margin-top: 34px; padding-top: 16px; border-top: 1px solid #e6e6e4; font-size: 11px; color: #aaa; }
</style>
</head>
<body>
<div id="root"><div class="loading">순위 데이터를 불러오는 중…</div></div>

<script>
const BOOK = {
  title: "UX의 언어들",
  subtitle: "마음과 행동을 움직이는 설계의 원리 · 한성희, 신행철 · 파지트",
  pubdate: "2026-07-07"
};

const U = {
  y_product: "https://www.yes24.com/product/goods/193444437",
  y_mkt:     "https://www.yes24.com/product/category/bestseller?categoryNumber=001001025009&pageNumber=1&pageSize=100",
  y_econ:    "https://www.yes24.com/product/category/bestseller?categoryNumber=001001025&pageNumber=1&pageSize=100",
  y_web:     "https://www.yes24.com/product/category/bestseller?categoryNumber=001001003020&pageNumber=1&pageSize=100",
  y_uxui:    "https://www.yes24.com/product/category/bestseller?categoryNumber=001001003020004&pageNumber=1&pageSize=100",
  refresh:   "https://github.com/cinaeng/ux-book-tracker/actions/workflows/collect.yml",
  k_product: "https://product.kyobobook.co.kr/detail/S000220493173",
  k_econ_w:  "https://store.kyobobook.co.kr/bestseller/online/weekly/domestic/13",
  k_econ_d:  "https://store.kyobobook.co.kr/bestseller/online/daily/domestic/13",
  k_it_d:    "https://store.kyobobook.co.kr/bestseller/online/daily/domestic/33",
  k_website: "https://store.kyobobook.co.kr/category/domestic/3319/best",
  k_uxui:    "https://store.kyobobook.co.kr/category/domestic/331902/best",
  k_tot_eco: "https://store.kyobobook.co.kr/bestseller/total/weekly/economics",
  k_tot_tec: "https://store.kyobobook.co.kr/bestseller/total/weekly/tech"
};

const nf = n => n == null ? "—" : n.toLocaleString("ko-KR");
const fmtTs = ts => {
  const d = new Date(ts), p = n => String(n).padStart(2, "0");
  return `${p(d.getMonth() + 1)}/${p(d.getDate())}`;
};
const deltaHtml = (c, p, lowerBetter) => {
  if (c == null || p == null || c === p) return "";
  const diff = c - p, improved = lowerBetter ? diff < 0 : diff > 0;
  return `<span class="delta ${improved ? "up" : "down"}">${improved ? "▲" : "▼"}${nf(Math.abs(diff))}</span>`;
};
const cell = v => v == null ? `<span class="na">권외</span>` : nf(v);

function rankCard(val, prevVal, label, sub, color, hero, href) {
  const body = val != null
    ? `<div class="val">${nf(val)}<small>위</small>${deltaHtml(val, prevVal, true)}</div>`
    : `<div class="val out">순위권 밖</div>`;
  const inner = `<div class="lbl"><span class="dot" style="background:${color}"></span>${label}</div>
    ${body}<div class="sub2">${sub}</div>`;
  const cls = `card${hero ? " hero" : ""}`;
  return href
    ? `<a class="${cls}" href="${href}" target="_blank" rel="noopener">${inner}</a>`
    : `<div class="${cls}">${inner}</div>`;
}

function render(H) {
  const cur = H[H.length - 1];
  const pre = H.length > 1 ? H[H.length - 2] : {};
  const days = Math.floor((new Date(cur.ts) - new Date(BOOK.pubdate + "T00:00:00+09:00")) / 864e5);
  const labels = H.map(h => fmtTs(h.ts));
  const y = cur.yes24 || {}, py = pre.yes24 || {};
  const ko = cur.kyobo_online || {}, pko = pre.kyobo_online || {};
  const kt = cur.kyobo_total || {}, pkt = pre.kyobo_total || {};
  const km = cur.kyobo_meta || {}, pkm = pre.kyobo_meta || {};

  document.getElementById("root").innerHTML = `
<div class="hdr">
  <div class="hdr-row">
    <div>
      <h1>${BOOK.title} — 서점 순위 트래커</h1>
      <p class="sub">${BOOK.subtitle}</p>
      <p class="meta">최종 수집 ${fmtTs(cur.ts)} · 출간 ${days}일차 · 매일 09시(KST) 예스24·교보문고 자동 갱신</p>
    </div>
    <a class="refresh" href="${U.refresh}" target="_blank" rel="noopener" title="GitHub Actions에서 'Run workflow'를 눌러 지금 바로 갱신합니다">
      ↻ 지금 갱신
    </a>
  </div>
</div>

<div class="tabs">
  <button class="on" data-tab="yes24">예스24</button>
  <button data-tab="kyobo">교보문고</button>
</div>

<div class="pane on" id="pane-yes24">
  <div class="cards">
    ${rankCard(y.uxui_rank, py.uxui_rank, "UX/UI", "IT모바일 &gt; 웹사이트 &gt; UI/UX", "#27ae60", true, U.y_uxui)}
    ${rankCard(y.web_rank, py.web_rank, "웹사이트", "IT모바일 &gt; 웹사이트", "#16a085", false, U.y_web)}
    ${rankCard(y.mkt_rank, py.mkt_rank, "마케팅/세일즈", "경제경영 &gt; 마케팅/세일즈", "#1a5fb4", false, U.y_mkt)}
    ${rankCard(y.econ_rank, py.econ_rank, "경제경영 종합", "경제경영 전체 베스트", "#c0392b", false, U.y_econ)}
    <a class="card" href="${U.y_product}" target="_blank" rel="noopener">
      <div class="lbl"><span class="dot" style="background:#e67e22"></span>판매지수</div>
      <div class="val">${nf(y.sales_index)}${deltaHtml(y.sales_index, py.sales_index, false)}</div>
      <div class="sub2">예스24 판매 선행지표</div>
    </a>
    <a class="card" href="${U.y_product}?ReviewYn=Y" target="_blank" rel="noopener">
      <div class="lbl"><span class="dot" style="background:#7f8c8d"></span>리뷰 · 평점</div>
      <div class="val">${nf(y.reviews)}<small>건</small>${deltaHtml(y.reviews, py.reviews, false)}</div>
      <div class="sub2">평점 ${y.rating ?? "—"}</div>
    </a>
  </div>

  <h2>순위 추이 <span>(낮을수록 좋음)</span></h2>
  <div class="panel"><div class="chartbox"><canvas id="c_y_rank"></canvas></div></div>

  <h2>판매지수 추이</h2>
  <div class="panel"><div class="chartbox"><canvas id="c_y_si"></canvas></div></div>

  <h2>수집 이력</h2>
  <div class="tablewrap"><table>
    <thead><tr><th>날짜</th><th>UX/UI</th><th>웹사이트</th><th>마케팅/세일즈</th><th>경제경영 종합</th><th>판매지수</th><th>리뷰</th></tr></thead>
    <tbody>${[...H].reverse().map(h => `<tr>
      <td>${fmtTs(h.ts)}</td><td>${cell(h.yes24?.uxui_rank)}</td><td>${cell(h.yes24?.web_rank)}</td>
      <td>${cell(h.yes24?.mkt_rank)}</td><td>${cell(h.yes24?.econ_rank)}</td>
      <td>${nf(h.yes24?.sales_index)}</td><td>${nf(h.yes24?.reviews)}</td></tr>`).join("")}
    </tbody>
  </table></div>

  <div class="note">
    <b>순위 기준</b> — 예스24 베스트셀러는 <b>최근 7일간 판매량·주문 수</b>로 매일 1회 집계됩니다.
    판매지수와는 별개 지표라, 판매지수가 낮아도 순위는 높게 잡힐 수 있습니다.<br>
    <b>읽는 법</b> — 이 책은 4개 분야에 동시 분류돼 있습니다.
    모수가 작은 <b>UX/UI</b>·<b>웹사이트</b>는 홍보에 바로 쓸 수 있는 숫자가 나오고,
    <b>마케팅/세일즈</b>는 마케팅 액션에 민감하게 반응합니다.
    <b>경제경영 종합</b>은 모수가 커서 100위권 진입이 실질 목표선입니다.
  </div>
  <div class="links">
    <a href="${U.y_product}" target="_blank">상품 페이지 ↗</a>
    <a href="${U.y_uxui}" target="_blank">UX/UI 베스트 ↗</a>
    <a href="${U.y_web}" target="_blank">웹사이트 베스트 ↗</a>
    <a href="${U.y_mkt}" target="_blank">마케팅/세일즈 베스트 ↗</a>
    <a href="${U.y_econ}" target="_blank">경제경영 베스트 ↗</a>
  </div>
</div>

<div class="pane" id="pane-kyobo">
  <div class="subtabs">
    <button class="on" data-sub="online">온라인 베스트</button>
    <button data-sub="total">종합 베스트</button>
  </div>

  <div class="pane on" id="sub-online">
    <div class="cards">
      ${rankCard(ko.econ_weekly, pko.econ_weekly, "경제/경영 · 주간", "온라인 주간 베스트", "#c0392b", true, U.k_econ_w)}
      ${rankCard(ko.econ_daily, pko.econ_daily, "경제/경영 · 일간", "온라인 일간 베스트 (~991위)", "#e74c3c", false, U.k_econ_d)}
      ${rankCard(ko.it_daily, pko.it_daily, "컴퓨터/IT · 일간", "온라인 일간 베스트 (~435위)", "#8e44ad", false, U.k_it_d)}
      ${rankCard(ko.website_cat, pko.website_cat, "웹사이트 카테고리", "카테고리 베스트 (24권)", "#16a085", false, U.k_website)}
      ${rankCard(ko.uxui_cat, pko.uxui_cat, "UX/UI 카테고리", "카테고리 베스트 (11권)", "#27ae60", false, U.k_uxui)}
      <a class="card" href="${U.k_product}" target="_blank" rel="noopener">
        <div class="lbl"><span class="dot" style="background:#7f8c8d"></span>리뷰 · 평점</div>
        <div class="val">${nf(km.reviews)}<small>건</small>${deltaHtml(km.reviews, pkm.reviews, false)}</div>
        <div class="sub2">Klover 평점 ${km.rating ?? "—"}</div>
      </a>
    </div>

    <h2>온라인 주간 · 경제/경영 순위 추이 <span>(낮을수록 좋음)</span></h2>
    <div class="panel"><div class="chartbox"><canvas id="c_k_rank"></canvas></div></div>

    <h2>수집 이력</h2>
    <div class="tablewrap"><table>
      <thead><tr><th>날짜</th><th>경제/경영 주간</th><th>경제/경영 일간</th><th>컴퓨터/IT 일간</th><th>웹사이트</th><th>UX/UI</th><th>리뷰</th></tr></thead>
      <tbody>${[...H].reverse().map(h => `<tr>
        <td>${fmtTs(h.ts)}</td><td>${cell(h.kyobo_online?.econ_weekly)}</td><td>${cell(h.kyobo_online?.econ_daily)}</td>
        <td>${cell(h.kyobo_online?.it_daily)}</td><td>${cell(h.kyobo_online?.website_cat)}</td>
        <td>${cell(h.kyobo_online?.uxui_cat)}</td><td>${nf(h.kyobo_meta?.reviews)}</td></tr>`).join("")}
      </tbody>
    </table></div>

    <div class="note warn">
      <b>교보문고에는 판매지수가 없습니다.</b> 예스24 판매지수·알라딘 Sales Point에 해당하는 판매 지표를
      교보는 공개하지 않습니다(상품 페이지 전체를 확인했습니다). 그래서 교보 탭은 <b>순위 + 리뷰·평점</b>만 추적합니다.
      판매 선행지표가 필요하면 예스24 탭의 판매지수를 보세요.
    </div>
    <div class="note">
      온라인 <b>주간</b> 경제/경영이 현재 유일하게 순위가 잡히는 목록입니다.
      일간 목록은 경제/경영이 991위, 컴퓨터/IT가 435위까지만 집계됩니다.
      카테고리 베스트(웹사이트 24권 · UX/UI 11권)는 목록이 매우 짧아, 진입하면 곧바로 홍보용 숫자가 됩니다.
    </div>
    <div class="links">
      <a href="${U.k_product}" target="_blank">상품 페이지 ↗</a>
      <a href="${U.k_econ_w}" target="_blank">온라인 주간 경제/경영 ↗</a>
      <a href="${U.k_website}" target="_blank">웹사이트 카테고리 ↗</a>
    </div>
  </div>

  <div class="pane" id="sub-total">
    <div class="cards">
      ${rankCard(kt.econ_weekly, pkt.econ_weekly, "경제경영 · 주간", "종합 주간 베스트 (TOP 20만 공개)", "#c0392b", true, U.k_tot_eco)}
      ${rankCard(kt.tech_weekly, pkt.tech_weekly, "기술/컴퓨터 · 주간", "종합 주간 베스트 (TOP 20만 공개)", "#8e44ad", false, U.k_tot_tec)}
    </div>

    <h2>수집 이력</h2>
    <div class="tablewrap"><table>
      <thead><tr><th>날짜</th><th>경제경영 주간</th><th>기술/컴퓨터 주간</th></tr></thead>
      <tbody>${[...H].reverse().map(h => `<tr>
        <td>${fmtTs(h.ts)}</td><td>${cell(h.kyobo_total?.econ_weekly)}</td>
        <td>${cell(h.kyobo_total?.tech_weekly)}</td></tr>`).join("")}
      </tbody>
    </table></div>

    <div class="note warn">
      <b>구조적 한계</b> — 교보 <b>종합 베스트</b>는 카테고리별로 <b>TOP 20까지만</b> 공개됩니다.
      페이지네이션이 없어 21위 이하는 순위 숫자를 알 수 없고, 진입 여부만 판별됩니다.
      이 탭은 <b>"TOP 20 진입 알림"</b> 용도로 보시면 됩니다. 추이는 온라인 베스트 탭을 쓰세요.
    </div>
    <div class="links">
      <a href="${U.k_tot_eco}" target="_blank">종합 주간 경제경영 ↗</a>
      <a href="${U.k_tot_tec}" target="_blank">종합 주간 기술/컴퓨터 ↗</a>
    </div>
  </div>
</div>

<div class="foot">GitHub Actions로 매일 자동 수집됩니다. · 인터파크 도서는 2024년 서비스 종료로 제외</div>`;

  // 탭
  document.querySelectorAll(".tabs button").forEach(b => b.onclick = () => {
    document.querySelectorAll(".tabs button").forEach(x => x.classList.remove("on"));
    b.classList.add("on");
    document.querySelectorAll("#pane-yes24, #pane-kyobo").forEach(p => p.classList.remove("on"));
    document.getElementById("pane-" + b.dataset.tab).classList.add("on");
  });
  document.querySelectorAll(".subtabs button").forEach(b => b.onclick = () => {
    document.querySelectorAll(".subtabs button").forEach(x => x.classList.remove("on"));
    b.classList.add("on");
    document.querySelectorAll("#sub-online, #sub-total").forEach(p => p.classList.remove("on"));
    document.getElementById("sub-" + b.dataset.sub).classList.add("on");
  });

  // 차트
  const base = (yTitle, reverse) => ({
    responsive: true, maintainAspectRatio: false,
    scales: {
      y: { reverse, beginAtZero: !reverse, title: { display: true, text: yTitle }, ticks: { precision: 0 } },
      x: { ticks: { maxRotation: 0, autoSkip: true } }
    },
    plugins: { legend: { display: false } }
  });

  new Chart(document.getElementById("c_y_rank"), {
    type: "line",
    data: { labels, datasets: [
      // 모수가 작은 니치 카테고리 — 왼쪽 축
      { label: "UX/UI", data: H.map(h => h.yes24?.uxui_rank ?? null),
        borderColor: "#27ae60", backgroundColor: "#27ae60", tension: .25, spanGaps: true, pointRadius: 3.5, yAxisID: "y" },
      { label: "웹사이트", data: H.map(h => h.yes24?.web_rank ?? null),
        borderColor: "#16a085", backgroundColor: "#16a085", tension: .25, spanGaps: true, pointRadius: 3.5, yAxisID: "y" },
      { label: "마케팅/세일즈", data: H.map(h => h.yes24?.mkt_rank ?? null),
        borderColor: "#1a5fb4", backgroundColor: "#1a5fb4", tension: .25, spanGaps: true, pointRadius: 3.5, yAxisID: "y" },
      // 모수가 큰 대분류 — 스케일이 달라 오른쪽 축으로 분리
      { label: "경제경영 종합", data: H.map(h => h.yes24?.econ_rank ?? null),
        borderColor: "#c0392b", backgroundColor: "#c0392b", borderDash: [5, 3],
        tension: .25, spanGaps: true, pointRadius: 3.5, yAxisID: "y1" }
    ]},
    options: {
      responsive: true, maintainAspectRatio: false,
      scales: {
        y:  { position: "left",  reverse: true, title: { display: true, text: "세부 카테고리" }, ticks: { precision: 0 } },
        y1: { position: "right", reverse: true, title: { display: true, text: "경제경영 종합" }, ticks: { precision: 0 }, grid: { drawOnChartArea: false } },
        x:  { ticks: { maxRotation: 0, autoSkip: true } }
      },
      plugins: { legend: { position: "bottom", labels: { boxWidth: 10, font: { size: 11 } } } }
    }
  });

  new Chart(document.getElementById("c_y_si"), {
    type: "line",
    data: { labels, datasets: [{ label: "판매지수", data: H.map(h => h.yes24?.sales_index ?? null),
      borderColor: "#e67e22", backgroundColor: "rgba(230,126,34,.12)", fill: true, tension: .25, spanGaps: true, pointRadius: 3.5 }] },
    options: base("판매지수", false)
  });

  new Chart(document.getElementById("c_k_rank"), {
    type: "line",
    data: { labels, datasets: [{ label: "경제/경영 주간", data: H.map(h => h.kyobo_online?.econ_weekly ?? null),
      borderColor: "#c0392b", backgroundColor: "rgba(192,57,43,.12)", fill: true, tension: .25, spanGaps: true, pointRadius: 3.5 }] },
    options: base("순위", true)
  });
}

fetch("./data/history.json?t=" + Date.now())
  .then(r => { if (!r.ok) throw new Error("history.json 로드 실패 (" + r.status + ")"); return r.json(); })
  .then(H => {
    if (!Array.isArray(H) || H.length === 0) throw new Error("수집된 데이터가 없습니다");
    render(H);
  })
  .catch(e => {
    document.getElementById("root").innerHTML =
      `<div class="loading">데이터를 불러오지 못했습니다.<br><small>${e.message}</small></div>`;
  });
</script>
</body>
</html>
