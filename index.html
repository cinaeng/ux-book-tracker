<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>UX의 언어들 — 서점 순위 트래커</title>
<meta name="description" content="도서 「UX의 언어들」의 예스24·교보문고 베스트셀러 순위 트래커">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='14' font-size='14'>📚</text></svg>">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.5.0/dist/chart.umd.js"></script>
<style>
  :root { color-scheme: light; }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: #f6f6f4; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Pretendard",
                 "Noto Sans KR", "Malgun Gothic", "맑은 고딕", sans-serif;
    color: #1a1a1a;
  }
  #root { max-width: 960px; margin: 0 auto; padding: 36px 28px 56px; }
  @media (max-width: 560px) { #root { padding: 22px 16px 40px; } }

  .loading { padding: 60px 0; text-align: center; color: #999; font-size: 14px; }

  .hdr { border-bottom: 2px solid #111; padding-bottom: 15px; margin-bottom: 20px; }
  .hdr-row { display: flex; justify-content: space-between; align-items: flex-start; gap: 16px; flex-wrap: wrap; }
  .hdr h1 { margin: 0 0 5px; font-size: 22px; font-weight: 700; letter-spacing: -0.4px; }
  .hdr .sub { font-size: 13px; color: #666; margin: 0; }
  .hdr .meta { font-size: 12px; color: #999; margin-top: 9px; }
  .hdr-actions { flex: 0 0 auto; display: flex; flex-direction: column; align-items: flex-end; gap: 6px; }
  .refresh {
    display: inline-flex; align-items: center; gap: 7px;
    text-decoration: none; white-space: nowrap; cursor: pointer;
    padding: 8px 15px; font-size: 12.5px; font-weight: 600;
    color: #fff; background: #111; border: none; border-radius: 999px;
    font-family: inherit; transition: background .12s, transform .12s;
  }
  .refresh:hover:not(:disabled) { background: #333; transform: translateY(-1px); }
  .refresh:disabled { background: #6b6b6b; cursor: default; }
  .refresh.done { background: #0a7f3f; }
  .spinner {
    width: 12px; height: 12px; border-radius: 50%;
    border: 2px solid rgba(255,255,255,.35); border-top-color: #fff;
    animation: spin .7s linear infinite; flex: 0 0 auto;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .lastsync { font-size: 11px; color: #999; white-space: nowrap; }
  .lastsync b { color: #555; font-weight: 600; }

  /* 모바일: 헤더가 줄바꿈되면 버튼 묶음이 어중간하게 뜬다.
     버튼과 '최근 갱신'을 한 줄에 나란히 놓고 왼쪽 정렬로 통일한다. */
  @media (max-width: 640px) {
    .hdr-row { flex-direction: column; align-items: stretch; gap: 12px; }
    .hdr-actions {
      flex-direction: row; align-items: center;
      justify-content: flex-start; gap: 10px; width: 100%;
    }
    .lastsync { font-size: 11.5px; }
  }

  .tabs { display: flex; gap: 4px; border-bottom: 1px solid #e0e0e0; margin-bottom: 20px; }
  .tabs button {
    appearance: none; border: none; background: none; cursor: pointer; font-family: inherit;
    padding: 10px 18px; font-size: 14px; font-weight: 600; color: #999;
    border-bottom: 2px solid transparent; margin-bottom: -1px; transition: color .12s;
  }
  .tabs button:hover { color: #555; }
  .tabs button.on { color: #111; border-bottom-color: #111; }

  .subtabs { display: flex; gap: 6px; margin-bottom: 20px; }
  .subtabs button {
    appearance: none; cursor: pointer; font-family: inherit;
    padding: 6px 14px; font-size: 12px; font-weight: 600;
    border: 1px solid #e0e0e0; background: #fff; color: #777; border-radius: 999px;
    transition: all .12s;
  }
  .subtabs button:hover { border-color: #bbb; color: #444; }
  .subtabs button.on { background: #111; border-color: #111; color: #fff; }

  .pane { display: none; }
  .pane.on { display: block; }

  .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(178px, 1fr)); gap: 12px; margin-bottom: 26px; }
  .card {
    border: 1px solid #e4e4e2; border-radius: 12px; padding: 14px 16px; background: #fff;
    position: relative; display: block; color: inherit; text-decoration: none;
    transition: border-color .12s, box-shadow .12s, transform .12s;
  }
  a.card { cursor: pointer; }
  a.card:hover { border-color: #999; box-shadow: 0 4px 14px rgba(0,0,0,.08); transform: translateY(-1px); }
  a.card::after {
    content: "↗"; position: absolute; top: 12px; right: 13px;
    font-size: 11px; color: #ccc; transition: color .12s;
  }
  a.card:hover::after { color: #1a5fb4; }
  .card.hero { background: #f1f6fd; border-color: #bcd5f0; }
  a.card.hero:hover { border-color: #5b9bd8; }
  .card .lbl { font-size: 11.5px; font-weight: 600; color: #555; margin-bottom: 9px; display: flex; align-items: center; gap: 6px; }
  .dot { width: 7px; height: 7px; border-radius: 50%; flex: 0 0 auto; }
  .card .val { font-size: 29px; font-weight: 700; letter-spacing: -1px; line-height: 1.1; }
  .card .val small { font-size: 13px; font-weight: 600; color: #555; }
  .card .val.out { font-size: 15px; color: #aaa; font-weight: 600; letter-spacing: 0; }
  .card .sub2 { font-size: 10.5px; color: #999; margin-top: 4px; line-height: 1.45; }
  .delta { font-size: 12px; font-weight: 700; margin-left: 6px; }
  .up { color: #0a7f3f; } .down { color: #c92a2a; }

  /* 순위(박스)와 구분되는 보조 지표 — 텍스트 한 줄 */
  .metrics {
    display: flex; align-items: baseline; flex-wrap: wrap; gap: 4px 10px;
    margin: -14px 0 26px; padding: 0 2px;
    font-size: 13px; color: #666;
  }
  .metric { display: inline-flex; align-items: baseline; gap: 6px; text-decoration: none; color: inherit; }
  a.metric:hover .mlbl, a.metric:hover b { color: #1a5fb4; }
  .metric .mlbl { color: #999; font-size: 12px; }
  .metric b { font-size: 15px; font-weight: 700; color: #1a1a1a; letter-spacing: -0.2px; }
  .metric .mnote { color: #aaa; font-size: 11.5px; }
  .metric.na-metric b { color: #bbb; }
  .msep { color: #ddd; }

  h2 { font-size: 13.5px; font-weight: 700; margin: 26px 0 12px; padding-bottom: 7px; border-bottom: 1px solid #e6e6e4; }
  h2 span { font-weight: 400; color: #999; font-size: 12px; }
  .panel { background: #fff; border: 1px solid #e4e4e2; border-radius: 12px; padding: 16px; }
  .chartbox { height: 225px; position: relative; }

  table { width: 100%; border-collapse: collapse; font-size: 12px; background: #fff; }
  th, td { padding: 8px 10px; text-align: right; border-bottom: 1px solid #f0f0ee; white-space: nowrap; }
  th { background: #f7f7f5; font-weight: 600; color: #555; font-size: 11px; }
  th:first-child, td:first-child { text-align: left; }
  tbody tr:last-child td { border-bottom: none; }
  /* 열이 많아 좁은 화면에선 가로 스크롤이 필요하다.
     overflow:hidden 이면 스크롤 자체가 막히므로 overflow-x:auto 로 둔다. */
  .tablewrap {
    border: 1px solid #e4e4e2; border-radius: 12px;
    overflow-x: auto; overflow-y: hidden;
    -webkit-overflow-scrolling: touch;
  }
  .tablewrap table { min-width: 520px; } /* 이보다 좁아지면 스크롤 */
  .tablewrap::-webkit-scrollbar { height: 6px; }
  .tablewrap::-webkit-scrollbar-thumb { background: #d6d6d4; border-radius: 3px; }
  .scrollhint { display: none; font-size: 11px; color: #aaa; margin: 6px 2px 0; }
  @media (max-width: 640px) { .scrollhint { display: block; } }
  .na { color: #ccc; }

  .note { margin-top: 20px; padding: 13px 15px; background: #fff; border-left: 3px solid #d4d4d2; border-radius: 0 8px 8px 0; font-size: 11.5px; color: #666; line-height: 1.7; border-top: 1px solid #eee; border-right: 1px solid #eee; border-bottom: 1px solid #eee; }
  .note.warn { background: #fdfaf5; border-left-color: #e0a96d; }
  .note b { color: #333; }
  .links { margin-top: 14px; font-size: 12px; display: flex; gap: 16px; flex-wrap: wrap; }
  .links a { color: #1a5fb4; text-decoration: none; }
  .links a:hover { text-decoration: underline; }
  .foot { margin-top: 34px; padding-top: 16px; border-top: 1px solid #e6e6e4; font-size: 11px; color: #aaa; }
</style>
</head>
<body>
<div id="root"><div class="loading">순위 데이터를 불러오는 중…</div></div>

<script>
const BOOK = {
  title: "UX의 언어들",
  subtitle: "마음과 행동을 움직이는 설계의 원리 · 한성희, 신행철 · 파지트",
  pubdate: "2026-07-07"
};

const U = {
  y_product: "https://www.yes24.com/product/goods/193444437",
  y_mkt:     "https://www.yes24.com/product/category/bestseller?categoryNumber=001001025009&pageNumber=1&pageSize=100",
  y_econ:    "https://www.yes24.com/product/category/bestseller?categoryNumber=001001025&pageNumber=1&pageSize=100",
  y_web:     "https://www.yes24.com/product/category/bestseller?categoryNumber=001001003020&pageNumber=1&pageSize=100",
  y_uxui:    "https://www.yes24.com/product/category/bestseller?categoryNumber=001001003020004&pageNumber=1&pageSize=100",
  y_ad:      "https://www.yes24.com/product/category/bestseller?categoryNumber=001001025009006&pageNumber=1&pageSize=100",
  y_design:  "https://www.yes24.com/product/category/bestseller?categoryNumber=001001007003004&pageNumber=1&pageSize=100",
  refresh:   "https://github.com/cinaeng/ux-book-tracker/actions/workflows/collect.yml",
  k_product: "https://product.kyobobook.co.kr/detail/S000220493173",
  k_econ_w:  "https://store.kyobobook.co.kr/bestseller/online/weekly/domestic/13",
  k_econ_d:  "https://store.kyobobook.co.kr/bestseller/online/daily/domestic/13",
  k_it_d:    "https://store.kyobobook.co.kr/bestseller/online/daily/domestic/33",
  k_website: "https://store.kyobobook.co.kr/category/domestic/3319/best",
  k_uxui:    "https://store.kyobobook.co.kr/category/domestic/331902/best",
  k_tot_eco: "https://store.kyobobook.co.kr/bestseller/total/weekly/economics",
  k_tot_tec: "https://store.kyobobook.co.kr/bestseller/total/weekly/tech",
  a_product: "https://www.aladin.co.kr/shop/wproduct.aspx?ItemId=397807838",
  a_best_ad: "https://www.aladin.co.kr/shop/common/wbest.aspx?BranchType=1&CID=268&BestType=Bestseller&cnt=100&SortOrder=1&page=1",
  a_best_design: "https://www.aladin.co.kr/shop/common/wbest.aspx?BranchType=1&CID=51089&BestType=Bestseller&cnt=100&SortOrder=1&page=1",
  a_best_brand: "https://www.aladin.co.kr/shop/common/wbest.aspx?BranchType=1&CID=1632&BestType=Bestseller&cnt=100&SortOrder=1&page=1",
  a_best_econ: "https://www.aladin.co.kr/shop/common/wbest.aspx?BranchType=1&CID=170&BestType=Bestseller&cnt=100&SortOrder=1&page=1",
  a_best_mkt: "https://www.aladin.co.kr/shop/common/wbest.aspx?BranchType=1&CID=261&BestType=Bestseller&cnt=100&SortOrder=1&page=1",
  a_best_designcraft: "https://www.aladin.co.kr/shop/common/wbest.aspx?BranchType=1&CID=50972&BestType=Bestseller&cnt=100&SortOrder=1&page=1"
};

const nf = n => n == null ? "—" : n.toLocaleString("ko-KR");
const fmtTs = ts => {
  const d = new Date(ts), p = n => String(n).padStart(2, "0");
  return `${p(d.getMonth() + 1)}/${p(d.getDate())}`;
};
// 최근 갱신 표시용 — 날짜 + 시각
const fmtFull = ts => {
  const d = new Date(ts), p = n => String(n).padStart(2, "0");
  return `${p(d.getMonth() + 1)}/${p(d.getDate())} ${p(d.getHours())}:${p(d.getMinutes())}`;
};
const deltaHtml = (c, p, lowerBetter) => {
  if (c == null || p == null || c === p) return "";
  const diff = c - p, improved = lowerBetter ? diff < 0 : diff > 0;
  return `<span class="delta ${improved ? "up" : "down"}">${improved ? "▲" : "▼"}${nf(Math.abs(diff))}</span>`;
};
const cell = v => v == null ? `<span class="na">권외</span>` : nf(v);

// 카테고리별 최고 순위(최저 숫자)와 현재 순위 연속 유지 횟수.
// 순위가 내려가도 best 는 계속 남고, 현재 순위가 이어지는 동안 streak 이 쌓인다.
function rankStats(H, get) {
  const s = H.map(get);
  const vals = s.filter(v => v != null);
  const best = vals.length ? Math.min(...vals) : null;
  const last = s[s.length - 1];
  let streak = 0;
  if (last != null) for (let i = s.length - 1; i >= 0 && s[i] === last; i--) streak++;
  return { best, streak, cur: last };
}

function rankCard(val, prevVal, label, sub, color, hero, href, rec) {
  const body = val != null
    ? `<div class="val">${nf(val)}<small>위</small>${deltaHtml(val, prevVal, true)}</div>`
    : `<div class="val out">순위권 밖</div>`;
  let recHtml = "";
  if (rec) {
    const b = [];
    if (rec.best != null) b.push(`<span style="color:#b26a00;font-weight:700;background:#fff5e6;border:1px solid #f0d9b0;border-radius:5px;padding:1px 6px;">최고 ${nf(rec.best)}위</span>`);
    if (rec.cur != null && rec.streak > 1) b.push(`<span style="color:#0a7f3f;font-weight:700;background:#ecf8f0;border:1px solid #bfe6cd;border-radius:5px;padding:1px 6px;">${rec.streak}일 연속</span>`);
    if (b.length) recHtml = `<div style="font-size:10.5px;margin-top:6px;display:flex;flex-wrap:wrap;gap:5px;">${b.join("")}</div>`;
  }
  const inner = `<div class="lbl"><span class="dot" style="background:${color}"></span>${label}</div>
    ${body}<div class="sub2">${sub}</div>${recHtml}`;
  const cls = `card${hero ? " hero" : ""}`;
  return href
    ? `<a class="${cls}" href="${href}" target="_blank" rel="noopener">${inner}</a>`
    : `<div class="${cls}">${inner}</div>`;
}

// 갱신 시 다시 그리므로, 기존 차트를 파기하지 않으면 Chart.js가 "Canvas is already in use"로 실패한다.
let charts = [];
function resetCharts() {
  charts.forEach(c => c.destroy());
  charts = [];
}

function render(H) {
  resetCharts();
  const cur = H[H.length - 1];
  const pre = H.length > 1 ? H[H.length - 2] : {};
  const days = Math.floor((new Date(cur.ts) - new Date(BOOK.pubdate + "T00:00:00+09:00")) / 864e5);
  const labels = H.map(h => fmtTs(h.ts));
  const y = cur.yes24 || {}, py = pre.yes24 || {};
  const a = cur.aladin || {}, pa = pre.aladin || {};
  const ko = cur.kyobo_online || {}, pko = pre.kyobo_online || {};
  const kt = cur.kyobo_total || {}, pkt = pre.kyobo_total || {};
  const km = cur.kyobo_meta || {}, pkm = pre.kyobo_meta || {};

  document.getElementById("root").innerHTML = `
<div class="hdr">
  <div class="hdr-row">
    <div>
      <h1>${BOOK.title} — 서점 순위 트래커</h1>
      <p class="sub">${BOOK.subtitle}</p>
      <p class="meta">최종 수집 ${fmtTs(cur.ts)} · 출간 ${days}일차 · 매일 새벽 4시(KST) 예스24·교보문고 자동 갱신</p>
    </div>
    <div class="hdr-actions">
      <button class="refresh" id="btnRefresh" title="최신 수집 결과를 다시 불러옵니다. 수집 자체는 매일 새벽 4시에 자동 실행됩니다.">
        <span id="btnIcon">↻</span><span id="btnText">새로고침</span>
      </button>
      <div class="lastsync">최근 갱신 <b id="lastSync">${fmtFull(cur.ts)}</b></div>
    </div>
  </div>
</div>

<div class="tabs">
  <button class="on" data-tab="yes24">예스24</button>
  <button data-tab="aladin">알라딘</button>
  <button data-tab="kyobo">교보문고</button>
</div>

<div class="pane on" id="pane-yes24">
  <div class="cards">
    ${rankCard(y.econ_rank, py.econ_rank, "경제경영 종합", "경제경영 전체 베스트", "#c0392b", false, U.y_econ, rankStats(H, h => (h.yes24||{}).econ_rank))}
    ${rankCard(y.mkt_rank, py.mkt_rank, "마케팅/세일즈", "경제경영 &gt; 마케팅/세일즈", "#1a5fb4", false, U.y_mkt, rankStats(H, h => (h.yes24||{}).mkt_rank))}
    ${rankCard(y.ad_rank, py.ad_rank, "광고/홍보/PR", "마케팅/세일즈 &gt; 광고/홍보/PR", "#8e44ad", false, U.y_ad, rankStats(H, h => (h.yes24||{}).ad_rank))}
    ${rankCard(y.design_rank, py.design_rank, "디자인", "예술 &gt; 미술 &gt; 디자인", "#d68910", false, U.y_design, rankStats(H, h => (h.yes24||{}).design_rank))}
    ${rankCard(y.web_rank, py.web_rank, "웹사이트", "IT모바일 &gt; 웹사이트", "#16a085", false, U.y_web, rankStats(H, h => (h.yes24||{}).web_rank))}
    ${rankCard(y.uxui_rank, py.uxui_rank, "UX/UI", "IT모바일 &gt; 웹사이트 &gt; UI/UX", "#27ae60", true, U.y_uxui, rankStats(H, h => (h.yes24||{}).uxui_rank))}
  </div>

  <div class="metrics">
    <a class="metric" href="${U.y_product}" target="_blank" rel="noopener">
      <span class="mlbl">판매지수</span>
      <b>${nf(y.sales_index)}</b>${deltaHtml(y.sales_index, py.sales_index, false)}
      <span class="mnote">판매 선행지표</span>
    </a>
    <span class="msep">·</span>
    <a class="metric" href="${U.y_product}?ReviewYn=Y" target="_blank" rel="noopener">
      <span class="mlbl">리뷰</span>
      <b>${nf(y.reviews)}건</b>${deltaHtml(y.reviews, py.reviews, false)}
      <span class="mnote">평점 ${y.rating ?? "—"}</span>
    </a>
  </div>

  <h2>순위 추이 <span>(낮을수록 좋음)</span></h2>
  <div class="panel"><div class="chartbox"><canvas id="c_y_rank"></canvas></div></div>

  <h2>판매지수 추이</h2>
  <div class="panel"><div class="chartbox"><canvas id="c_y_si"></canvas></div></div>

  <h2>수집 이력</h2>
  <div class="tablewrap"><table>
    <thead><tr><th>날짜</th><th>경제경영 종합</th><th>마케팅/세일즈</th><th>광고/홍보/PR</th><th>디자인</th><th>웹사이트</th><th>UX/UI</th><th>판매지수</th><th>리뷰</th></tr></thead>
    <tbody>${[...H].reverse().map(h => `<tr>
      <td>${fmtTs(h.ts)}</td><td>${cell(h.yes24?.econ_rank)}</td><td>${cell(h.yes24?.mkt_rank)}</td>
      <td>${cell(h.yes24?.ad_rank)}</td><td>${cell(h.yes24?.design_rank)}</td>
      <td>${cell(h.yes24?.web_rank)}</td><td>${cell(h.yes24?.uxui_rank)}</td>
      <td>${nf(h.yes24?.sales_index)}</td><td>${nf(h.yes24?.reviews)}</td></tr>`).join("")}
    </tbody>
  </table></div>
  <div class="scrollhint">← 표를 옆으로 밀면 나머지 열이 보입니다</div>

  <div class="note">
    <b>순위 기준</b> — 예스24 베스트셀러는 <b>최근 7일간 판매량·주문 수</b>로 매일 1회 집계됩니다.

<div class="foot">
  매일 새벽 4시(KST) GitHub Actions가 자동 수집합니다. 위 <b>새로고침</b>은 최신 수집 결과를 다시 읽어옵니다.
  지금 당장 다시 수집해야 한다면 <a href="${U.refresh}" target="_blank" rel="noopener">Actions에서 수동 실행</a>하세요.
  · 인터파크 도서는 2024년 서비스 종료로 제외
</div>`;

  // ── 새로고침 ──
  // 이 대시보드는 정적 페이지(GitHub Pages)라, 여기서 수집 워크플로를 직접 실행할 수는 없다.
  // 실행하려면 GitHub 토큰이 필요한데 공개 페이지에 토큰을 심으면 누구나 저장소에 쓸 수 있게 된다.
  // 그래서 이 버튼은 "최신 수집 결과를 다시 읽어오는" 역할만 한다.
  // 수집 자체는 매일 새벽 4시(KST) GitHub Actions가 자동으로 돌린다.
  const btn = document.getElementById("btnRefresh");
  const btnText = document.getElementById("btnText");

  btn.onclick = async () => {
    const icon = document.getElementById("btnIcon");
    btn.disabled = true;
    btn.classList.remove("done");
    icon.outerHTML = `<span class="spinner" id="btnIcon"></span>`;
    btnText.textContent = "불러오는 중";

    const finish = (msg, ok) => {
      const ic = document.getElementById("btnIcon");
      ic.outerHTML = `<span id="btnIcon">${ok ? "✓" : "↻"}</span>`;
      btn.classList.toggle("done", ok);
      btnText.textContent = msg;
      // 잠시 뒤 기본 상태로 되돌린다
      setTimeout(() => {
        const i2 = document.getElementById("btnIcon");
        if (i2) i2.textContent = "↻";
        btn.classList.remove("done");
        btnText.textContent = "새로고침";
        btn.disabled = false;
      }, 2000);
    };

    try {
      const r = await fetch("./data/history.json?t=" + Date.now(), { cache: "no-store" });
      if (!r.ok) throw new Error(r.status);
      const fresh = await r.json();
      const changed = fresh[fresh.length - 1]?.ts !== cur.ts;
      render(fresh); // 항상 최신 데이터로 다시 그린다 (버튼 상태도 함께 초기화됨)
      // render()가 버튼을 새로 만들었으므로, 결과 표시는 새 버튼에 적용한다
      const nb = document.getElementById("btnRefresh");
      const nt = document.getElementById("btnText");
      const ni = document.getElementById("btnIcon");
      if (nb && nt && ni) {
        nb.classList.toggle("done", changed);
        ni.textContent = changed ? "✓" : "✓";
        nt.textContent = changed ? "갱신됨" : "최신 상태";
        setTimeout(() => {
          nb.classList.remove("done");
          ni.textContent = "↻";
          nt.textContent = "새로고침";
        }, 2000);
      }
    } catch (e) {
      finish("실패 — 재시도", false);
    }
  };

  // 탭
  document.querySelectorAll(".tabs button").forEach(b => b.onclick = () => {
    document.querySelectorAll(".tabs button").forEach(x => x.classList.remove("on"));
    b.classList.add("on");
    document.querySelectorAll("#pane-yes24, #pane-aladin, #pane-kyobo").forEach(p => p.classList.remove("on"));
    document.getElementById("pane-" + b.dataset.tab).classList.add("on");
  });
  document.querySelectorAll(".subtabs button").forEach(b => b.onclick = () => {
    document.querySelectorAll(".subtabs button").forEach(x => x.classList.remove("on"));
    b.classList.add("on");
    document.querySelectorAll("#sub-online, #sub-total").forEach(p => p.classList.remove("on"));
    document.getElementById("sub-" + b.dataset.sub).classList.add("on");
  });

  // 차트
  const base = (yTitle, reverse) => ({
    responsive: true, maintainAspectRatio: false,
    scales: {
      y: { reverse, beginAtZero: !reverse, title: { display: true, text: yTitle }, ticks: { precision: 0 } },
      x: { ticks: { maxRotation: 0, autoSkip: true } }
    },
    plugins: { legend: { display: false } }
  });

  charts.push(new Chart(document.getElementById("c_y_rank"), {
    type: "line",
    // 범례 순서는 위쪽 카드 순서와 동일하게 맞춘다: 경제경영 종합 → 마케팅/세일즈 → 웹사이트 → UX/UI
    data: { labels, datasets: [
      // 모수가 큰 대분류 — 스케일이 달라 오른쪽 축으로 분리
      { label: "경제경영 종합", data: H.map(h => h.yes24?.econ_rank ?? null),
        borderColor: "#c0392b", backgroundColor: "#c0392b", borderDash: [5, 3],
        tension: .25, spanGaps: true, pointRadius: 3.5, yAxisID: "y1" },
      // 모수가 작은 니치 카테고리 — 왼쪽 축
      { label: "마케팅/세일즈", data: H.map(h => h.yes24?.mkt_rank ?? null),
        borderColor: "#1a5fb4", backgroundColor: "#1a5fb4", tension: .25, spanGaps: true, pointRadius: 3.5, yAxisID: "y" },
      { label: "광고/홍보/PR", data: H.map(h => h.yes24?.ad_rank ?? null),
        borderColor: "#8e44ad", backgroundColor: "#8e44ad", tension: .25, spanGaps: true, pointRadius: 3.5, yAxisID: "y" },
      { label: "디자인", data: H.map(h => h.yes24?.design_rank ?? null),
        borderColor: "#d68910", backgroundColor: "#d68910", tension: .25, spanGaps: true, pointRadius: 3.5, yAxisID: "y" },
      { label: "웹사이트", data: H.map(h => h.yes24?.web_rank ?? null),
        borderColor: "#16a085", backgroundColor: "#16a085", tension: .25, spanGaps: true, pointRadius: 3.5, yAxisID: "y" },
      { label: "UX/UI", data: H.map(h => h.yes24?.uxui_rank ?? null),
        borderColor: "#27ae60", backgroundColor: "#27ae60", tension: .25, spanGaps: true, pointRadius: 3.5, yAxisID: "y" }
    ]},
    options: {
      responsive: true, maintainAspectRatio: false,
      scales: {
        y:  { position: "left",  reverse: true, title: { display: true, text: "세부 카테고리" }, ticks: { precision: 0 } },
        y1: { position: "right", reverse: true, title: { display: true, text: "경제경영 종합" }, ticks: { precision: 0 }, grid: { drawOnChartArea: false } },
        x:  { ticks: { maxRotation: 0, autoSkip: true } }
      },
      plugins: { legend: { position: "bottom", labels: { boxWidth: 10, font: { size: 11 } } } }
    }
  }));

  charts.push(new Chart(document.getElementById("c_y_si"), {
    type: "line",
    data: { labels, datasets: [{ label: "판매지수", data: H.map(h => h.yes24?.sales_index ?? null),
      borderColor: "#e67e22", backgroundColor: "rgba(230,126,34,.12)", fill: true, tension: .25, spanGaps: true, pointRadius: 3.5 }] },
    options: base("판매지수", false)
  }));

  charts.push(new Chart(document.getElementById("c_a_sp"), {
    type: "line",
    data: { labels, datasets: [{ label: "세일즈포인트", data: H.map(h => h.aladin?.sales_point ?? null),
      borderColor: "#e74c3c", backgroundColor: "rgba(231,76,60,.12)", fill: true, tension: .25, spanGaps: true, pointRadius: 3.5 }] },
    options: base("세일즈포인트", false)
  }));

  charts.push(new Chart(document.getElementById("c_a_rank"), {
    type: "line",
    data: { labels, datasets: [{ label: "주간 순위", data: H.map(h => h.aladin?.weekly_rank ?? null),
      borderColor: "#c0392b", backgroundColor: "rgba(192,57,43,.12)", fill: true, tension: .25, spanGaps: true, pointRadius: 3.5 }] },
    options: base("순위", true)
  }));

  charts.push(new Chart(document.getElementById("c_k_rank"), {
    type: "line",
    data: { labels, datasets: [{ label: "경제/경영 주간", data: H.map(h => h.kyobo_online?.econ_weekly ?? null),
      borderColor: "#c0392b", backgroundColor: "rgba(192,57,43,.12)", fill: true, tension: .25, spanGaps: true, pointRadius: 3.5 }] },
    options: base("순위", true)
  }));
}

fetch("./data/history.json?t=" + Date.now())
  .then(r => { if (!r.ok) throw new Error("history.json 로드 실패 (" + r.status + ")"); return r.json(); })
  .then(H => {
    if (!Array.isArray(H) || H.length === 0) throw new Error("수집된 데이터가 없습니다");
    render(H);
  })
  .catch(e => {
    document.getElementById("root").innerHTML =
      `<div class="loading">데이터를 불러오지 못했습니다.<br><small>${e.message}</small></div>`;
  });
</script>
</body>
</html>
